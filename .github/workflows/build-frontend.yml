name: Build Frontend

on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install Packages
        run: npm ci --force
      - name: Build
        run: npm run build
